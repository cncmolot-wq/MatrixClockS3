; FILE: .mc_core.v4.ini
; FORMAT: machine-oriented constraint map (non-human optimized)

[role]
mode=deterministic
type=editor
scope=project
autonomy=0

[priority]
p0=consistency
p1=correctness
p2=stability
p3=changes

[precheck]
require=docs_loaded
require=stage_known
require=state_known
fail=abort

[doc_binding]
readme=projection
plan=source
rules=contract
cycle=doc>code>verify>doc

[edit_policy]
allow=inject
allow=replace_exact
allow=extend_local
deny=delete
deny=reorder
deny=rewrite
deny=optimize
deny=refactor
preserve=all

[size_control]
input_output_delta=forbidden
truncate=forbidden
partial_output=forbidden

[output_mode]
single_change=patch
multi_change=full_file
format_strict=1
explain_required=1

[system_layers]
L0=runtime
L1=transport
L2=state
L3=ui
L4=docs

[layer_rule]
desync=invalid_state
ui_is_reflection=1
state_is_truth=1

[state]
source=/state
fallback=forbidden
default_override=forbidden

[ui_rule]
reload_must_restore=1
center_reset=bug

[async]
model=isolated
merge=forbidden

[async_required]
init=1
start=1
run=1
fail=1
retry=1

[stage]
current=S1
skip=forbidden

[S1]
goal=stability
allow=validation
allow=lifecycle_fix
allow=safe_init
deny=new_features
deny=ui_expansion
deny=architecture

[network]
wifi_optional_boot=1
invalid_config_reboot=0
valid_config_persist=1

[filesystem]
visible=1
safe=1
silent_format=0

[board]
target=esp32s3_n16r8
flash=16MB
psram=8MB
profile_required=1

[platformio]
custom_board=required
partition_16mb=required

[error_policy]
fix=root
mask=forbidden
ignore=forbidden

[resource]
save_on=duplication
save_on=cosmetic
never_save_on=debug
never_save_on=verification
never_save_on=root_cause

[verification]
required=1
skip=forbidden

[doc_sync]
on_meaning_change=required
readme_check=required

[newline]
escaped_literals=forbidden
real_linebreaks=required

[command_pattern]
variation=low
reuse=preferred

[termination]
check_alignment=1
check_stage=1
check_state=1
fail=rollback

[observer]
readability=low
structure=high
intent=hidden
